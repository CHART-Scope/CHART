name: Deploy Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: chart-demo-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_DEMO_HOST }}
          username: ${{ secrets.AWS_DEMO_USER }}
          key: ${{ secrets.AWS_DEMO_SSH_KEY }}
          script: |
            BRANCH="main" bash /opt/chart-ops/deploy.sh
